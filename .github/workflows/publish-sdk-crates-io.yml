name: Publish SDK To Crates.io

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish from tag."
        required: true
        type: string

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Embedded Bootstrap Checksum Against Release Asset
        env:
          TAG: ${{ inputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${TAG#refs/tags/}"
          release_sha_url="https://github.com/${REPOSITORY}/releases/download/${tag}/af-bootstrap.sha256"
          curl -fsSL "${release_sha_url}" -o /tmp/af-bootstrap.sha256

          release_sha="$(awk 'NR==1{print $1}' /tmp/af-bootstrap.sha256 | tr '[:upper:]' '[:lower:]')"
          if [ -z "${release_sha}" ]; then
            echo "failed to parse release checksum from ${release_sha_url}"
            exit 1
          fi

          manifest_path="sdk/rust/src/generated/bootstrap-sha256.toml"
          if [ ! -f "${manifest_path}" ]; then
            echo "missing manifest file: ${manifest_path}"
            exit 1
          fi

          embedded_sha="$(
            sed -nE 's/^linux-x86_64[[:space:]]*=[[:space:]]*"([0-9a-fA-F]{64})".*$/\1/p' "${manifest_path}" \
              | head -n 1 \
              | tr '[:upper:]' '[:lower:]'
          )"
          if [ -z "${embedded_sha}" ]; then
            echo "failed to parse linux-x86_64 checksum from ${manifest_path}"
            exit 1
          fi

          if [ "${embedded_sha}" != "${release_sha}" ]; then
            echo "checksum mismatch:"
            echo "  release asset: ${release_sha}"
            echo "  sdk manifest : ${embedded_sha}"
            exit 1
          fi

          echo "checksum matched for linux-x86_64: ${embedded_sha}"

      - name: Publish af-rpc-proto
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p af-rpc-proto --locked

      - name: Publish af-rpc-transport
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if cargo publish -p af-rpc-transport --locked; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "af-rpc-transport publish failed, retrying in 20 seconds..."
            sleep 20
          done

      - name: Publish af-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if cargo publish -p af-sdk --locked; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "af-sdk publish failed, retrying in 20 seconds..."
            sleep 20
          done
