version: 1
rules:
  - id: deny-system-file-write
    kind: deny
    priority: 1000
    enabled: true
    match:
      operation_kinds: ["exec"]
    when: "facts.system_file_write == true"
    effect:
      decision: deny
      reason: system file writes are denied
      runtime_backend: sandbox
      requirements: []

  - id: ask-system-admin
    kind: approval
    priority: 950
    enabled: true
    match:
      operation_kinds: ["exec"]
    when: "facts.system_admin == true"
    effect:
      decision: ask
      reason: system admin operation requires approval
      runtime_backend: sandbox
      requirements: []
      approval:
        summary: system admin operation requires approval
        details: reply yes/no in the agent-tui to continue
        items:
          - kind: command
            summary: command requests system administration capability

  - id: ask-process-control
    kind: approval
    priority: 940
    enabled: true
    match:
      operation_kinds: ["exec"]
    when: "facts.process_control == true"
    effect:
      decision: ask
      reason: process control requires approval
      runtime_backend: sandbox
      requirements: []
      approval:
        summary: process control requires approval
        details: reply yes/no in the agent-tui to continue
        items:
          - kind: process
            summary: command can control other processes

  - id: ask-credential-access
    kind: approval
    priority: 930
    enabled: true
    match:
      operation_kinds: ["exec"]
    when: "facts.credential_access == true"
    effect:
      decision: ask
      reason: credential access requires approval
      runtime_backend: sandbox
      requirements: []
      approval:
        summary: credential access requires approval
        details: reply yes/no in the agent-tui to continue
        items:
          - kind: credential
            summary: command may access credentials or secrets

  - id: ask-network-access
    kind: approval
    priority: 900
    enabled: true
    match:
      operation_kinds: ["exec"]
    when: "facts.network_access == true"
    effect:
      decision: ask
      reason: network access requires approval
      runtime_backend: sandbox
      requirements: []
      approval:
        summary: network access requires approval
        details: reply yes/no in the agent-tui to continue
        items:
          - kind: network
            summary: outbound network access

  - id: ask-unknown-intent
    kind: approval
    priority: 850
    enabled: true
    match:
      operation_kinds: ["exec"]
    when: "facts.unknown_intent == true"
    effect:
      decision: ask
      reason: command intent is uncertain
      runtime_backend: sandbox
      requirements: []
      approval:
        summary: uncertain command intent requires approval
        details: reply yes/no in the agent-tui to continue
        items:
          - kind: command
            summary: parser cannot classify the command with enough confidence

  - id: allow-safe-file-write
    kind: allow
    priority: 700
    enabled: true
    match:
      operation_kinds: ["exec"]
    when: "facts.safe_file_write == true && facts.system_file_write != true"
    effect:
      decision: allow
      reason: allow low-risk file writes
      runtime_backend: sandbox
      requirements: []

  - id: allow-default-exec
    kind: allow
    priority: 100
    enabled: true
    match:
      operation_kinds: ["exec"]
    when: "true"
    effect:
      decision: allow
      reason: allow command execution by default
      runtime_backend: sandbox
      requirements: []
