syntax = "proto3";

package agent.fort.v1;

import "agent/fort/v1/common.proto";
import "agent/fort/v1/task.proto";

enum ApprovalDecision {
  APPROVAL_DECISION_UNSPECIFIED = 0;
  APPROVAL_DECISION_APPROVE = 1;
  APPROVAL_DECISION_DENY = 2;
}

message ApprovalItem {
  string kind = 1;
  string target = 2;
  string summary = 3;
}

message Approval {
  string approval_id = 1;
  string session_id = 2;
  string task_id = 3;
  string trace_id = 4;
  ApprovalStatus status = 5;
  string summary = 6;
  repeated ApprovalItem items = 7;
  optional string details = 8;
  uint64 created_at_ms = 9;
  uint64 expires_at_ms = 10;
  optional uint64 responded_at_ms = 11;
  optional string response_reason = 12;
  optional string response_idempotency_key = 13;
}

message InvokeResult {
  Task task = 1;
  oneof outcome {
    ExecutionResult execution = 2;
    PendingApproval approval = 3;
  }
}

message GetApprovalRequest {
  string session_id = 1;
  string approval_id = 2;
  string client_instance_id = 3;
  string rebind_token = 4;
}

message GetApprovalResponse {
  Approval approval = 1;
}

message RespondApprovalRequest {
  string session_id = 1;
  string approval_id = 2;
  ApprovalDecision decision = 3;
  string idempotency_key = 4;
  optional string reason = 5;
  string client_instance_id = 6;
  string rebind_token = 7;
}

message RespondApprovalResponse {
  Approval approval = 1;
  Task task = 2;
  optional InvokeResult invoke_result = 3;
}
