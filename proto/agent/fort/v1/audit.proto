syntax = "proto3";

package agent.fort.v1;

enum AuditEventType {
  AUDIT_EVENT_TYPE_UNSPECIFIED = 0;
  AUDIT_EVENT_TYPE_IPC_PEER_UNAUTHORIZED = 1;
  AUDIT_EVENT_TYPE_SESSION_CREATED = 2;
  AUDIT_EVENT_TYPE_SESSION_TERMINATED = 3;
  AUDIT_EVENT_TYPE_TASK_CREATED = 4;
  AUDIT_EVENT_TYPE_TASK_STARTED = 5;
  AUDIT_EVENT_TYPE_TASK_COMPLETED = 6;
  AUDIT_EVENT_TYPE_TASK_FAILED = 7;
  AUDIT_EVENT_TYPE_TASK_CANCELLED = 8;
  AUDIT_EVENT_TYPE_APPROVAL_CREATED = 9;
  AUDIT_EVENT_TYPE_APPROVAL_APPROVED = 10;
  AUDIT_EVENT_TYPE_APPROVAL_DENIED = 11;
  AUDIT_EVENT_TYPE_APPROVAL_EXPIRED = 12;
  AUDIT_EVENT_TYPE_APPROVAL_CANCELLED = 13;
  AUDIT_EVENT_TYPE_POLICY_DENIED = 14;
  AUDIT_EVENT_TYPE_INVOCATION_STARTED = 15;
  AUDIT_EVENT_TYPE_INVOCATION_AWAITING_APPROVAL = 16;
  AUDIT_EVENT_TYPE_INVOCATION_RESUMED_AFTER_APPROVAL = 17;
  AUDIT_EVENT_TYPE_INVOCATION_COMPLETED = 18;
  AUDIT_EVENT_TYPE_INVOCATION_DENIED = 19;
  AUDIT_EVENT_TYPE_INVOCATION_CANCELLED = 20;
  AUDIT_EVENT_TYPE_INVOCATION_FAILED = 21;
}

message AuditEvent {
  uint64 seq = 1;
  uint64 ts_ms = 2;
  string trace_id = 3;
  optional string session_id = 4;
  optional string task_id = 5;
  AuditEventType event_type = 6;
  optional string payload_json = 7;
  optional string error_code = 8;

  reserved 100 to 199;
}
