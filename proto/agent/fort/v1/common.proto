syntax = "proto3";

package agent.fort.v1;

message TraceMeta {
  optional string trace_id = 1;
  optional string client_instance_id = 2;
}

enum RpcErrorCode {
  RPC_ERROR_CODE_UNSPECIFIED = 0;
  RPC_ERROR_CODE_BAD_REQUEST = 1;
  RPC_ERROR_CODE_METHOD_NOT_SUPPORTED = 2;
  RPC_ERROR_CODE_DAEMON_UNAVAILABLE = 3;
  RPC_ERROR_CODE_SESSION_NOT_FOUND = 4;
  RPC_ERROR_CODE_INVALID_SESSION_STATE = 5;
  RPC_ERROR_CODE_SESSION_REBIND_DENIED = 6;
  RPC_ERROR_CODE_TASK_NOT_FOUND = 7;
  RPC_ERROR_CODE_INVALID_TASK_STATE = 8;
  RPC_ERROR_CODE_APPROVAL_NOT_FOUND = 9;
  RPC_ERROR_CODE_APPROVAL_INVALID_STATE = 10;
  RPC_ERROR_CODE_APPROVAL_EXPIRED = 11;
  RPC_ERROR_CODE_APPROVAL_IDEMPOTENCY_CONFLICT = 12;
  RPC_ERROR_CODE_POLICY_DENIED = 13;
  RPC_ERROR_CODE_STORE_ERROR = 14;
  RPC_ERROR_CODE_AUDIT_WRITE_FAILED = 15;
  RPC_ERROR_CODE_INTERNAL_ERROR = 16;
}

message RpcError {
  RpcErrorCode code = 1;
  string message = 2;
}

enum ApprovalStatus {
  APPROVAL_STATUS_UNSPECIFIED = 0;
  APPROVAL_STATUS_PENDING = 1;
  APPROVAL_STATUS_APPROVED = 2;
  APPROVAL_STATUS_DENIED = 3;
  APPROVAL_STATUS_EXPIRED = 4;
  APPROVAL_STATUS_CANCELLED = 5;
}

message DaemonInfo {
  string daemon_instance_id = 1;
  string protocol = 2;
  repeated string routes = 3;
}
