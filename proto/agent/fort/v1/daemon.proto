syntax = "proto3";

package agent.fort.v1;

import "agent/fort/v1/approval.proto";
import "agent/fort/v1/common.proto";
import "agent/fort/v1/policy.proto";
import "agent/fort/v1/session.proto";
import "agent/fort/v1/task.proto";

enum RpcMethod {
  RPC_METHOD_UNSPECIFIED = 0;
  RPC_METHOD_PING = 1;
  RPC_METHOD_GET_DAEMON_INFO = 2;
  RPC_METHOD_CREATE_SESSION = 3;
  RPC_METHOD_RENEW_LEASE = 4;
  RPC_METHOD_KEEPALIVE = 5;
  RPC_METHOD_INVOKE = 6;
  RPC_METHOD_GET_SESSION = 7;
  RPC_METHOD_TERMINATE_SESSION = 8;
  RPC_METHOD_CREATE_TASK = 9;
  RPC_METHOD_GET_TASK = 10;
  RPC_METHOD_CANCEL_TASK = 11;
  RPC_METHOD_LIST_PENDING_APPROVALS = 12;
  RPC_METHOD_GET_APPROVAL = 13;
  RPC_METHOD_RESPOND_APPROVAL = 14;
  RPC_METHOD_GET_POLICY_STATE = 15;
  RPC_METHOD_EVALUATE_POLICY = 16;
  RPC_METHOD_AMEND_POLICY_FILE = 17;
  RPC_METHOD_RELOAD_POLICY = 18;
}

message RpcRequest {
  RpcMethod method = 1;
  bytes payload = 2;
}

message RpcResponse {
  oneof outcome {
    bytes payload = 1;
    RpcError error = 2;
  }
}

message PingRequest {}

message PingResponse {
  string status = 1;
  string daemon_instance_id = 2;
}

message GetDaemonInfoRequest {}

message GetDaemonInfoResponse {
  DaemonInfo info = 1;
}

message InvokeRequest {
  string session_id = 1;
  string client_instance_id = 2;
  string rebind_token = 3;
  string capability = 4;
  string operation = 5;
  string input_json = 6;
  optional string goal = 7;
  optional string limits_json = 8;
}

message InvokeResponse {
  InvokeResult result = 1;
}

service AgentFortService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc GetDaemonInfo(GetDaemonInfoRequest) returns (GetDaemonInfoResponse);
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc RenewLease(RenewLeaseRequest) returns (RenewLeaseResponse);
  rpc Keepalive(KeepaliveRequest) returns (KeepaliveResponse);
  rpc Invoke(InvokeRequest) returns (InvokeResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc TerminateSession(TerminateSessionRequest) returns (TerminateSessionResponse);
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc ListPendingApprovals(ListPendingApprovalsRequest) returns (ListPendingApprovalsResponse);
  rpc GetApproval(GetApprovalRequest) returns (GetApprovalResponse);
  rpc RespondApproval(RespondApprovalRequest) returns (RespondApprovalResponse);
  rpc GetPolicyState(GetPolicyStateRequest) returns (GetPolicyStateResponse);
  rpc EvaluatePolicy(EvaluatePolicyRequest) returns (EvaluatePolicyResponse);
  rpc AmendPolicyFile(AmendPolicyFileRequest) returns (AmendPolicyFileResponse);
  rpc ReloadPolicy(ReloadPolicyRequest) returns (ReloadPolicyResponse);
}
