syntax = "proto3";

package agent.fort.v1;

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_ACTIVE = 1;
  SESSION_STATUS_EXPIRED = 2;
  SESSION_STATUS_TERMINATED = 3;
}

message SessionLease {
  string client_instance_id = 1;
  string rebind_token = 2;
  uint64 expires_at_ms = 3;
}

message Session {
  string session_id = 1;
  string agent_name = 2;
  SessionStatus status = 3;
  SessionLease lease = 4;
  uint64 created_at_ms = 5;
  uint64 updated_at_ms = 6;
}

message CreateSessionRequest {
  string agent_name = 1;
  string client_instance_id = 2;
  optional uint64 lease_ttl_secs = 3;
}

message CreateSessionResponse {
  Session session = 1;
}

message RenewLeaseRequest {
  string session_id = 1;
  string client_instance_id = 2;
  string rebind_token = 3;
  optional uint64 lease_ttl_secs = 4;
}

message RenewLeaseResponse {
  Session session = 1;
}

message KeepaliveRequest {
  string session_id = 1;
  string client_instance_id = 2;
  string rebind_token = 3;
  optional uint64 lease_ttl_secs = 4;
}

message KeepaliveResponse {
  Session session = 1;
}

message GetSessionRequest {
  string session_id = 1;
  string client_instance_id = 2;
  string rebind_token = 3;
}

message GetSessionResponse {
  Session session = 1;
}

message TerminateSessionRequest {
  string session_id = 1;
  string client_instance_id = 2;
  string rebind_token = 3;
}

message TerminateSessionResponse {
  Session session = 1;
}
