syntax = "proto3";

package agent.fort.v1;

import "agent/fort/v1/common.proto";
import "google/protobuf/struct.proto";

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_RUNNING = 2;
  TASK_STATUS_BLOCKED = 3;
  TASK_STATUS_COMPLETED = 4;
  TASK_STATUS_FAILED = 5;
  TASK_STATUS_CANCELLED = 6;
}

enum TaskCreatedBy {
  TASK_CREATED_BY_UNSPECIFIED = 0;
  TASK_CREATED_BY_EXPLICIT = 1;
}

message TaskOperation {
  string kind = 1;
  google.protobuf.Struct payload = 2;
  google.protobuf.Struct options = 3;
  map<string, string> labels = 4;
}

message ExecutionResult {
  string state = 1;
  optional int32 exit_code = 2;
  bool timed_out = 3;
  string stdout = 4;
  string stderr = 5;
  bool stdout_truncated = 6;
  bool stderr_truncated = 7;
  repeated ExecutionEffect effects = 8;
}

enum ExecutionEffectKind {
  EXECUTION_EFFECT_KIND_UNSPECIFIED = 0;
  EXECUTION_EFFECT_KIND_FILE_READ = 1;
  EXECUTION_EFFECT_KIND_FILE_WRITE = 2;
  EXECUTION_EFFECT_KIND_NETWORK_EGRESS = 3;
  EXECUTION_EFFECT_KIND_PROCESS_EXEC = 4;
}

message ExecutionEffect {
  ExecutionEffectKind kind = 1;
  string target = 2;
}

message PendingApproval {
  string approval_id = 1;
  ApprovalStatus status = 2;
  uint64 expires_at_ms = 3;
  string task_id = 4;
  string summary = 5;
}

message TaskDenied {
  optional string code = 1;
  optional string message = 2;
}

message TaskOutcome {
  oneof outcome {
    ExecutionResult execution = 1;
    PendingApproval approval = 2;
    TaskDenied denied = 3;
  }
}

message Task {
  string task_id = 1;
  string session_id = 2;
  TaskStatus status = 3;
  optional string goal = 4;
  TaskCreatedBy created_by = 5;
  string trace_id = 6;
  optional string limits_json = 7;
  uint32 current_step = 8;
  optional string error_code = 9;
  optional string error_message = 10;
  uint64 created_at_ms = 11;
  uint64 updated_at_ms = 12;
  optional uint64 ended_at_ms = 13;
}

message CreateTaskRequest {
  string session_id = 1;
  string client_instance_id = 2;
  string rebind_token = 3;
  optional string goal = 4;
  optional string limits_json = 5;
  TaskOperation operation = 6;
}

message CreateTaskResponse {
  Task task = 1;
  TaskOutcome outcome = 2;
}

message GetTaskRequest {
  string session_id = 1;
  string task_id = 2;
  string client_instance_id = 3;
  string rebind_token = 4;
}

message GetTaskResponse {
  Task task = 1;
}

message CancelTaskRequest {
  string session_id = 1;
  string task_id = 2;
  string client_instance_id = 3;
  string rebind_token = 4;
}

message CancelTaskResponse {
  Task task = 1;
}
